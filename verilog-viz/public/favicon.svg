<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#1a1b26"/>
  <!-- Circuit traces -->
  <!-- Horizontal trace top -->
  <line x1="4" y1="8" x2="14" y2="8" stroke="#7aa2f7" stroke-width="1.5"/>
  <!-- Vertical trace left -->
  <line x1="4" y1="8" x2="4" y2="24" stroke="#7aa2f7" stroke-width="1.5"/>
  <!-- Horizontal trace bottom -->
  <line x1="4" y1="24" x2="14" y2="24" stroke="#9ece6a" stroke-width="1.5"/>
  <!-- Horizontal trace right top -->
  <line x1="18" y1="8" x2="28" y2="8" stroke="#7aa2f7" stroke-width="1.5"/>
  <!-- Vertical trace right -->
  <line x1="28" y1="8" x2="28" y2="24" stroke="#7aa2f7" stroke-width="1.5"/>
  <!-- Horizontal trace right bottom -->
  <line x1="18" y1="24" x2="28" y2="24" stroke="#ff9e64" stroke-width="1.5"/>
  <!-- Center IC box -->
  <rect x="13" y="6" width="6" height="20" rx="1" fill="#292e42" stroke="#3b4261" stroke-width="1"/>
  <!-- IC pins left -->
  <rect x="10" y="10" width="3" height="1.5" rx="0.5" fill="#9ece6a"/>
  <rect x="10" y="15" width="3" height="1.5" rx="0.5" fill="#9ece6a"/>
  <rect x="10" y="20" width="3" height="1.5" rx="0.5" fill="#9ece6a"/>
  <!-- IC pins right -->
  <rect x="19" y="10" width="3" height="1.5" rx="0.5" fill="#ff9e64"/>
  <rect x="19" y="15" width="3" height="1.5" rx="0.5" fill="#ff9e64"/>
  <rect x="19" y="20" width="3" height="1.5" rx="0.5" fill="#ff9e64"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="#7aa2f7"/>
</svg>
